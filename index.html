<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body class="page">
    <main class="card">
      <img
        src="./assets/images/illustration-article.svg"
        alt="illustration-article image"
        class="card__image"
      />

      <p class="card__eyebrow">Learning</p>

      <p class="card__date">Published 21 Dec 2023</p>

      <h1 class="card__header">
        <a href="#" class = "card__header--link">HTML & CSS foundations</a>
      </h1>

      <p class="card__description">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>
      <div class="card__profile-pic-container">
        <img
          src="./assets/images/image-avatar.webp"
          alt="profile pic"
          class="profile-pic"
        />
        <span class="profile-pic__text">Hooper Greg</span>
      </div>
    </main>
  </body>
</html>
